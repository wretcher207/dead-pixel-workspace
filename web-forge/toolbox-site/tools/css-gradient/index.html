<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Gradient Generator | Dead Pixel Toolbox</title>
  <meta name="description" content="Generate beautiful CSS gradients with live preview. Linear and radial gradients, custom color stops, presets, and one-click copy.">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    /* ---- Tool-specific styles ---- */
    .gradient-preview {
      width: 100%;
      min-height: 340px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      transition: background var(--transition);
      position: relative;
    }

    .gradient-preview-label {
      position: absolute;
      bottom: 12px;
      right: 14px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      pointer-events: none;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 20px;
      margin-top: 24px;
    }

    @media (max-width: 900px) {
      .tool-grid {
        grid-template-columns: 1fr;
      }
    }

    .controls-stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Color stop row */
    .color-stop {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .color-stop input[type="color"] {
      -webkit-appearance: none;
      appearance: none;
      width: 36px;
      height: 36px;
      border: 2px solid var(--border);
      border-radius: 6px;
      background: none;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
    }

    .color-stop input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 2px;
    }

    .color-stop input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 3px;
    }

    .color-stop input[type="range"] {
      flex: 1;
      min-width: 80px;
    }

    .color-stop .pos-value {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }

    .color-stop .btn-remove {
      width: 28px;
      height: 28px;
      padding: 0;
      display: grid;
      place-items: center;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text-faint);
      cursor: pointer;
      transition: all var(--transition);
      flex-shrink: 0;
      font-size: 1rem;
      line-height: 1;
    }

    .color-stop .btn-remove:hover {
      color: var(--danger);
      border-color: var(--danger);
      background: rgba(255, 68, 102, 0.08);
    }

    .color-stop .btn-remove:disabled {
      opacity: 0;
      pointer-events: none;
    }

    /* Angle control */
    .angle-control {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .angle-control input[type="range"] {
      flex: 1;
    }

    .angle-control input[type="number"] {
      width: 72px;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      text-align: center;
      outline: none;
      transition: border-color var(--transition);
    }

    .angle-control input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .angle-unit {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--text-faint);
    }

    /* Radial shape selector */
    .radial-options {
      display: none;
    }

    .radial-options.visible {
      display: block;
    }

    .shape-selector {
      display: flex;
      gap: 8px;
    }

    .shape-btn {
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 16px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .shape-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
    }

    .shape-btn.active {
      background: var(--bg-card);
      color: var(--accent);
      border-color: var(--accent-dim);
    }

    /* Presets grid */
    .presets-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    @media (max-width: 640px) {
      .presets-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .preset-swatch {
      aspect-ratio: 1.4;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      cursor: pointer;
      transition: all var(--transition);
    }

    .preset-swatch:hover {
      transform: scale(1.08);
      border-color: var(--accent-dim);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    /* Output area */
    .output-area {
      position: relative;
    }

    .output-area code {
      display: block;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .actions-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .linear-options {
      display: block;
    }

    .linear-options.hidden {
      display: none;
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495111704142071"
     crossorigin="anonymous"></script>
</head>
<body>
  <div id="header"></div>

  <main class="page-wrapper tool-container">
    <div class="tool-header fade-in">
      <div class="tool-breadcrumb">
        <a href="../../">Home</a>
        <span>/</span>
        <span>CSS Gradient</span>
      </div>
      <h1 class="tool-title">CSS Gradient Generator</h1>
      <p class="tool-description">Build linear and radial gradients visually. Adjust colors, stops, and angles with live preview, then grab the CSS.</p>
    </div>

    <div class="tool-grid">
      <!-- Left: Preview + Output -->
      <div class="controls-stack fade-in fade-in-1">
        <div class="panel">
          <div class="gradient-preview" id="gradientPreview">
            <span class="gradient-preview-label">preview</span>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <span class="panel-label">CSS Output</span>
            <button class="btn btn-sm btn-primary" id="copyBtn" onclick="copyCSS()">Copy CSS</button>
          </div>
          <div class="output-area" id="cssOutput">
            <code id="cssCode"></code>
          </div>
        </div>
      </div>

      <!-- Right: Controls -->
      <div class="controls-stack fade-in fade-in-2">
        <!-- Type tabs -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-label">Type</span>
          </div>
          <div class="tabs" id="typeTabs">
            <button class="tab active" data-type="linear" onclick="setType('linear')">Linear</button>
            <button class="tab" data-type="radial" onclick="setType('radial')">Radial</button>
          </div>
        </div>

        <!-- Direction / Angle -->
        <div class="panel linear-options" id="linearOptions">
          <div class="panel-header">
            <span class="panel-label">Angle</span>
          </div>
          <div class="angle-control">
            <input type="range" id="angleSlider" min="0" max="360" value="135" oninput="syncAngle(this.value)">
            <input type="number" id="angleInput" min="0" max="360" value="135" oninput="syncAngle(this.value)">
            <span class="angle-unit">deg</span>
          </div>
        </div>

        <!-- Radial options -->
        <div class="panel radial-options" id="radialOptions">
          <div class="panel-header">
            <span class="panel-label">Shape</span>
          </div>
          <div class="shape-selector">
            <button class="shape-btn active" data-shape="circle" onclick="setShape('circle')">Circle</button>
            <button class="shape-btn" data-shape="ellipse" onclick="setShape('ellipse')">Ellipse</button>
          </div>
        </div>

        <!-- Color stops -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-label">Color Stops</span>
            <button class="btn btn-sm btn-secondary" id="addStopBtn" onclick="addStop()">+ Add</button>
          </div>
          <div class="controls-stack" id="stopsContainer"></div>
        </div>

        <!-- Actions -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-label">Actions</span>
          </div>
          <div class="actions-row">
            <button class="btn btn-secondary" onclick="randomGradient()">Random</button>
            <button class="btn btn-ghost" onclick="resetGradient()">Reset</button>
          </div>
        </div>

        <!-- Presets -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-label">Presets</span>
          </div>
          <div class="presets-grid" id="presetsGrid"></div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="../../js/shared.js"></script>
  <script>
    // ---- Inject header & footer ----
    document.getElementById('header').innerHTML = getHeaderHTML('CSS Gradient');
    document.getElementById('footer').innerHTML = getFooterHTML();

    // ---- State ----
    let state = {
      type: 'linear',
      angle: 135,
      shape: 'circle',
      stops: [
        { color: '#6366f1', position: 0 },
        { color: '#06b6d4', position: 100 }
      ]
    };

    const MAX_STOPS = 5;

    // ---- Presets ----
    const presets = [
      { name: 'Indigo Cyan', type: 'linear', angle: 135, stops: [{ color: '#6366f1', position: 0 }, { color: '#06b6d4', position: 100 }] },
      { name: 'Sunset', type: 'linear', angle: 135, stops: [{ color: '#f97316', position: 0 }, { color: '#ec4899', position: 50 }, { color: '#8b5cf6', position: 100 }] },
      { name: 'Ocean', type: 'linear', angle: 180, stops: [{ color: '#0ea5e9', position: 0 }, { color: '#2dd4bf', position: 100 }] },
      { name: 'Neon', type: 'linear', angle: 90, stops: [{ color: '#00e87b', position: 0 }, { color: '#4d8dff', position: 100 }] },
      { name: 'Ember', type: 'linear', angle: 45, stops: [{ color: '#dc2626', position: 0 }, { color: '#f59e0b', position: 100 }] },
      { name: 'Midnight', type: 'radial', shape: 'circle', stops: [{ color: '#312e81', position: 0 }, { color: '#0f172a', position: 100 }] },
      { name: 'Aurora', type: 'linear', angle: 160, stops: [{ color: '#a855f7', position: 0 }, { color: '#22d3ee', position: 40 }, { color: '#34d399', position: 100 }] },
      { name: 'Smoke', type: 'radial', shape: 'ellipse', stops: [{ color: '#374151', position: 0 }, { color: '#111827', position: 100 }] }
    ];

    // ---- Init ----
    function init() {
      renderPresets();
      renderStops();
      updateGradient();
    }

    // ---- Type switching ----
    function setType(type) {
      state.type = type;
      document.querySelectorAll('#typeTabs .tab').forEach(t => {
        t.classList.toggle('active', t.dataset.type === type);
      });
      document.getElementById('linearOptions').classList.toggle('hidden', type !== 'linear');
      document.getElementById('radialOptions').classList.toggle('visible', type === 'radial');
      updateGradient();
    }

    // ---- Shape switching ----
    function setShape(shape) {
      state.shape = shape;
      document.querySelectorAll('.shape-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.shape === shape);
      });
      updateGradient();
    }

    // ---- Angle sync ----
    function syncAngle(val) {
      val = Math.max(0, Math.min(360, parseInt(val) || 0));
      state.angle = val;
      document.getElementById('angleSlider').value = val;
      document.getElementById('angleInput').value = val;
      updateGradient();
    }

    // ---- Color stops ----
    function renderStops() {
      const container = document.getElementById('stopsContainer');
      const canRemove = state.stops.length > 2;
      container.innerHTML = state.stops.map((stop, i) => `
        <div class="color-stop">
          <input type="color" value="${stop.color}" onchange="updateStop(${i}, 'color', this.value)" oninput="updateStop(${i}, 'color', this.value)">
          <input type="range" min="0" max="100" value="${stop.position}" oninput="updateStop(${i}, 'position', this.value)">
          <span class="pos-value">${stop.position}%</span>
          <button class="btn-remove" onclick="removeStop(${i})" ${canRemove ? '' : 'disabled'} title="Remove stop">&times;</button>
        </div>
      `).join('');

      // Toggle add button
      document.getElementById('addStopBtn').style.display = state.stops.length >= MAX_STOPS ? 'none' : '';
    }

    function updateStop(index, prop, value) {
      if (prop === 'position') {
        state.stops[index].position = parseInt(value);
      } else {
        state.stops[index].color = value;
      }
      renderStops();
      updateGradient();
    }

    function addStop() {
      if (state.stops.length >= MAX_STOPS) return;
      // Insert a color between the last two stops
      const last = state.stops[state.stops.length - 1];
      const prev = state.stops[state.stops.length - 2];
      const midPos = Math.round((prev.position + last.position) / 2);
      const midColor = blendColors(prev.color, last.color, 0.5);
      state.stops.splice(state.stops.length - 1, 0, { color: midColor, position: midPos });
      renderStops();
      updateGradient();
    }

    function removeStop(index) {
      if (state.stops.length <= 2) return;
      state.stops.splice(index, 1);
      renderStops();
      updateGradient();
    }

    // ---- Build gradient string ----
    function buildGradientCSS() {
      const stops = state.stops.map(s => `${s.color} ${s.position}%`).join(', ');
      if (state.type === 'linear') {
        return `linear-gradient(${state.angle}deg, ${stops})`;
      }
      return `radial-gradient(${state.shape} at center, ${stops})`;
    }

    function buildFullCSS() {
      const grad = buildGradientCSS();
      return `background: ${grad};`;
    }

    // ---- Update preview + output ----
    function updateGradient() {
      const grad = buildGradientCSS();
      document.getElementById('gradientPreview').style.background = grad;
      document.getElementById('cssCode').textContent = buildFullCSS();
    }

    // ---- Copy ----
    function copyCSS() {
      copyToClipboard(buildFullCSS());
    }

    // ---- Random ----
    function randomGradient() {
      const count = 2 + Math.floor(Math.random() * 3); // 2-4 stops
      state.angle = Math.floor(Math.random() * 360);
      state.type = Math.random() > 0.25 ? 'linear' : 'radial';
      state.shape = Math.random() > 0.5 ? 'circle' : 'ellipse';
      state.stops = [];
      for (let i = 0; i < count; i++) {
        state.stops.push({
          color: randomColor(),
          position: Math.round((i / (count - 1)) * 100)
        });
      }
      // Sync UI
      setType(state.type);
      if (state.type === 'radial') setShape(state.shape);
      syncAngle(state.angle);
      renderStops();
      updateGradient();
    }

    function randomColor() {
      const hue = Math.floor(Math.random() * 360);
      const sat = 60 + Math.floor(Math.random() * 35);
      const lit = 40 + Math.floor(Math.random() * 30);
      return hslToHex(hue, sat, lit);
    }

    // ---- Reset ----
    function resetGradient() {
      state = {
        type: 'linear',
        angle: 135,
        shape: 'circle',
        stops: [
          { color: '#6366f1', position: 0 },
          { color: '#06b6d4', position: 100 }
        ]
      };
      setType('linear');
      syncAngle(135);
      renderStops();
      updateGradient();
    }

    // ---- Presets ----
    function renderPresets() {
      const grid = document.getElementById('presetsGrid');
      grid.innerHTML = presets.map((p, i) => {
        const stops = p.stops.map(s => `${s.color} ${s.position}%`).join(', ');
        let bg;
        if (p.type === 'linear') {
          bg = `linear-gradient(${p.angle || 135}deg, ${stops})`;
        } else {
          bg = `radial-gradient(${p.shape || 'circle'} at center, ${stops})`;
        }
        return `<div class="preset-swatch" style="background:${bg}" title="${p.name}" onclick="applyPreset(${i})"></div>`;
      }).join('');
    }

    function applyPreset(index) {
      const p = presets[index];
      state.type = p.type;
      state.angle = p.angle || 135;
      state.shape = p.shape || 'circle';
      state.stops = p.stops.map(s => ({ ...s }));
      setType(state.type);
      if (state.type === 'radial') setShape(state.shape);
      syncAngle(state.angle);
      renderStops();
      updateGradient();
    }

    // ---- Color utils ----
    function hslToHex(h, s, l) {
      s /= 100;
      l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * color).toString(16).padStart(2, '0');
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return [r, g, b];
    }

    function blendColors(hex1, hex2, t) {
      const [r1, g1, b1] = hexToRgb(hex1);
      const [r2, g2, b2] = hexToRgb(hex2);
      const r = Math.round(r1 + (r2 - r1) * t);
      const g = Math.round(g1 + (g2 - g1) * t);
      const b = Math.round(b1 + (b2 - b1) * t);
      return '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('');
    }

    // ---- Go ----
    init();
  </script>
</body>
</html>
