<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 Encoder / Decoder — Dead Pixel Toolbox</title>
  <meta name="description" content="Encode and decode Base64 strings and files directly in your browser. Handles UTF-8 text and binary files. No data leaves your machine.">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .mode-tabs { margin-bottom: 20px; }

    .input-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .input-toggle .btn { flex: 1; text-align: center; justify-content: center; }
    .input-toggle .btn.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent);
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-glow);
      color: var(--accent);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .drop-zone-icon {
      font-size: 2rem;
      margin-bottom: 8px;
      display: block;
      opacity: 0.5;
    }

    .drop-zone-label {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .drop-zone-hint {
      font-size: 0.75rem;
      color: var(--text-faint);
      margin-top: 6px;
    }

    .file-info {
      display: none;
      align-items: center;
      gap: 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-top: 12px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text);
    }

    .file-info.visible { display: flex; }

    .file-info-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-info-size { color: var(--text-muted); white-space: nowrap; }

    .size-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-faint);
      margin-top: 8px;
      gap: 12px;
    }

    .output-wrap {
      position: relative;
    }

    .output-wrap textarea {
      color: var(--accent);
      resize: vertical;
    }

    .action-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .text-input-section,
    .file-input-section {
      display: none;
    }
    .text-input-section.active,
    .file-input-section.active {
      display: block;
    }

    .panel-actions {
      display: flex;
      gap: 8px;
    }

    .error-msg {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--danger);
      margin-top: 8px;
      display: none;
    }
    .error-msg.visible { display: block; }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495111704142071"
     crossorigin="anonymous"></script>
</head>
<body>
  <div id="header"></div>

  <main class="page-wrapper tool-container">
    <div class="tool-header fade-in fade-in-1">
      <div class="tool-breadcrumb">
        <a href="../../">Home</a>
        <span>/</span>
        <span>Base64 Encoder</span>
      </div>
      <h1 class="tool-title">Base64 Encoder / Decoder</h1>
      <p class="tool-description">Encode text or files to Base64, or decode Base64 back to text and binary. Everything runs client-side — nothing leaves your browser.</p>
    </div>

    <!-- Mode Tabs -->
    <div class="mode-tabs fade-in fade-in-2">
      <div class="tabs" role="tablist">
        <button class="tab active" role="tab" data-mode="encode" aria-selected="true">Encode</button>
        <button class="tab" role="tab" data-mode="decode" aria-selected="false">Decode</button>
      </div>
    </div>

    <!-- Split Layout -->
    <div class="split-layout fade-in fade-in-3">
      <!-- INPUT PANEL -->
      <div class="panel" id="input-panel">
        <div class="panel-header">
          <span class="panel-label">Input</span>
          <div class="panel-actions">
            <button class="btn btn-ghost btn-sm" id="btn-clear" title="Clear">Clear</button>
          </div>
        </div>

        <!-- Text / File toggle (encode mode only) -->
        <div class="input-toggle" id="input-toggle">
          <button class="btn btn-secondary btn-sm active" data-input="text">Text</button>
          <button class="btn btn-secondary btn-sm" data-input="file">File</button>
        </div>

        <!-- Text input -->
        <div class="text-input-section active" id="text-input-section">
          <textarea id="input-text" rows="12" placeholder="Paste or type here..."></textarea>
        </div>

        <!-- File input -->
        <div class="file-input-section" id="file-input-section">
          <div class="drop-zone" id="drop-zone">
            <span class="drop-zone-icon">&#8682;</span>
            <div class="drop-zone-label">Drop a file here or click to browse</div>
            <div class="drop-zone-hint">Any file type, max 10 MB recommended</div>
            <input type="file" id="file-input">
          </div>
          <div class="file-info" id="file-info">
            <span class="file-info-name" id="file-name"></span>
            <span class="file-info-size" id="file-size-display"></span>
            <button class="btn btn-ghost btn-sm" id="btn-remove-file">Remove</button>
          </div>
        </div>

        <div class="size-bar">
          <span id="input-size">0 bytes</span>
        </div>
      </div>

      <!-- OUTPUT PANEL -->
      <div class="panel" id="output-panel">
        <div class="panel-header">
          <span class="panel-label">Output</span>
          <div class="panel-actions">
            <button class="btn btn-ghost btn-sm" id="btn-copy" title="Copy to clipboard">Copy</button>
          </div>
        </div>

        <div class="output-wrap">
          <textarea id="output-text" rows="12" readonly placeholder="Output appears here..."></textarea>
        </div>

        <div class="error-msg" id="error-msg"></div>

        <div class="size-bar">
          <span id="output-size">0 bytes</span>
        </div>

        <div class="action-row">
          <button class="btn btn-primary btn-sm" id="btn-download">Download Output</button>
        </div>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="../../js/shared.js"></script>
  <script>
    // Render shared header / footer
    document.getElementById('header').innerHTML = getHeaderHTML('Base64 Encoder');
    document.getElementById('footer').innerHTML = getFooterHTML();

    // State
    let currentMode = 'encode';   // 'encode' | 'decode'
    let inputSource = 'text';     // 'text' | 'file'
    let loadedFileData = null;    // ArrayBuffer from file input
    let loadedFileName = '';

    // DOM refs
    const modeTabs      = document.querySelectorAll('.tabs .tab');
    const inputToggle   = document.getElementById('input-toggle');
    const toggleBtns    = inputToggle.querySelectorAll('.btn');
    const textSection   = document.getElementById('text-input-section');
    const fileSection   = document.getElementById('file-input-section');
    const inputText     = document.getElementById('input-text');
    const outputText    = document.getElementById('output-text');
    const dropZone      = document.getElementById('drop-zone');
    const fileInput     = document.getElementById('file-input');
    const fileInfo      = document.getElementById('file-info');
    const fileNameEl    = document.getElementById('file-name');
    const fileSizeEl    = document.getElementById('file-size-display');
    const inputSizeEl   = document.getElementById('input-size');
    const outputSizeEl  = document.getElementById('output-size');
    const errorMsg      = document.getElementById('error-msg');
    const btnClear      = document.getElementById('btn-clear');
    const btnCopy       = document.getElementById('btn-copy');
    const btnDownload   = document.getElementById('btn-download');
    const btnRemoveFile = document.getElementById('btn-remove-file');

    // --- Utilities ---
    function formatBytes(bytes) {
      if (bytes === 0) return '0 bytes';
      const units = ['bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      const val = bytes / Math.pow(1024, i);
      return val.toFixed(i === 0 ? 0 : 2) + ' ' + units[i];
    }

    function utf8Encode(str) {
      return new TextEncoder().encode(str);
    }

    function utf8Decode(bytes) {
      return new TextDecoder('utf-8', { fatal: true }).decode(bytes);
    }

    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    function base64ToArrayBuffer(b64) {
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes.buffer;
    }

    // --- Mode switching ---
    modeTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        modeTabs.forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected', 'false'); });
        tab.classList.add('active');
        tab.setAttribute('aria-selected', 'true');
        currentMode = tab.dataset.mode;

        // In decode mode, hide file input toggle and force text input
        if (currentMode === 'decode') {
          inputToggle.style.display = 'none';
          switchInputSource('text');
          inputText.placeholder = 'Paste Base64 string here...';
        } else {
          inputToggle.style.display = 'flex';
          inputText.placeholder = 'Paste or type here...';
        }

        convert();
      });
    });

    // --- Input source toggle (text vs file) ---
    function switchInputSource(source) {
      inputSource = source;
      toggleBtns.forEach(b => b.classList.toggle('active', b.dataset.input === source));
      textSection.classList.toggle('active', source === 'text');
      fileSection.classList.toggle('active', source === 'file');

      if (source === 'text') {
        convert();
      } else if (loadedFileData) {
        convert();
      } else {
        clearOutput();
      }
    }

    toggleBtns.forEach(btn => {
      btn.addEventListener('click', () => switchInputSource(btn.dataset.input));
    });

    // --- File handling ---
    function handleFile(file) {
      if (!file) return;
      loadedFileName = file.name;
      const reader = new FileReader();
      reader.onload = (e) => {
        loadedFileData = e.target.result;
        fileNameEl.textContent = file.name;
        fileSizeEl.textContent = formatBytes(file.size);
        fileInfo.classList.add('visible');
        inputSizeEl.textContent = formatBytes(file.size);
        convert();
      };
      reader.readAsArrayBuffer(file);
    }

    fileInput.addEventListener('change', (e) => {
      handleFile(e.target.files[0]);
    });

    // Drag and drop
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    btnRemoveFile.addEventListener('click', () => {
      loadedFileData = null;
      loadedFileName = '';
      fileInput.value = '';
      fileInfo.classList.remove('visible');
      clearOutput();
      inputSizeEl.textContent = '0 bytes';
    });

    // --- Conversion ---
    function convert() {
      hideError();

      if (currentMode === 'encode') {
        encode();
      } else {
        decode();
      }
    }

    function encode() {
      try {
        let result;
        if (inputSource === 'file' && loadedFileData) {
          result = arrayBufferToBase64(loadedFileData);
          inputSizeEl.textContent = formatBytes(loadedFileData.byteLength);
        } else {
          const text = inputText.value;
          if (!text) { clearOutput(); return; }
          const encoded = utf8Encode(text);
          result = arrayBufferToBase64(encoded.buffer);
          inputSizeEl.textContent = formatBytes(encoded.byteLength);
        }
        outputText.value = result;
        outputSizeEl.textContent = formatBytes(result.length);
      } catch (e) {
        showError('Encoding failed: ' + e.message);
        clearOutput();
      }
    }

    function decode() {
      const text = inputText.value.trim();
      if (!text) { clearOutput(); inputSizeEl.textContent = '0 bytes'; return; }

      inputSizeEl.textContent = formatBytes(text.length);

      try {
        const buffer = base64ToArrayBuffer(text);
        // Try to decode as UTF-8 text first
        try {
          const decoded = utf8Decode(new Uint8Array(buffer));
          outputText.value = decoded;
          outputSizeEl.textContent = formatBytes(new Uint8Array(buffer).byteLength);
        } catch {
          // Not valid UTF-8 — show as hex preview and note it's binary
          const bytes = new Uint8Array(buffer);
          const hexPreview = Array.from(bytes.slice(0, 500))
            .map(b => b.toString(16).padStart(2, '0'))
            .join(' ');
          outputText.value = '[Binary data — ' + formatBytes(bytes.byteLength) + ']\n\n' + hexPreview + (bytes.length > 500 ? '\n...' : '');
          outputSizeEl.textContent = formatBytes(bytes.byteLength);
        }
      } catch (e) {
        showError('Invalid Base64 input');
        clearOutput();
      }
    }

    function clearOutput() {
      outputText.value = '';
      outputSizeEl.textContent = '0 bytes';
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function hideError() {
      errorMsg.classList.remove('visible');
    }

    // --- Live conversion (debounced) ---
    const debouncedConvert = debounce(convert, 200);
    inputText.addEventListener('input', () => {
      if (inputSource === 'text') {
        debouncedConvert();
      }
    });

    // --- Actions ---
    btnClear.addEventListener('click', () => {
      inputText.value = '';
      loadedFileData = null;
      loadedFileName = '';
      fileInput.value = '';
      fileInfo.classList.remove('visible');
      clearOutput();
      hideError();
      inputSizeEl.textContent = '0 bytes';
    });

    btnCopy.addEventListener('click', () => {
      const text = outputText.value;
      if (text) copyToClipboard(text);
    });

    btnDownload.addEventListener('click', () => {
      if (currentMode === 'encode') {
        // Download the base64 string as a .txt
        const output = outputText.value;
        if (!output) return;
        const name = loadedFileName ? loadedFileName + '.b64.txt' : 'encoded.b64.txt';
        downloadFile(name, output, 'text/plain');
      } else {
        // Decode and download as binary
        const b64 = inputText.value.trim();
        if (!b64) return;
        try {
          const buffer = base64ToArrayBuffer(b64);
          const blob = new Blob([buffer], { type: 'application/octet-stream' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'decoded-output';
          a.click();
          URL.revokeObjectURL(url);
          showToast('File downloaded');
        } catch (e) {
          showError('Cannot decode — invalid Base64');
        }
      }
    });
  </script>
</body>
</html>
