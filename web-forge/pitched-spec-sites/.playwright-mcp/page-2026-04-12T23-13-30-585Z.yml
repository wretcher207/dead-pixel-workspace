      - heading "Top floor of the Dana Warp Mill." [level=2] [ref=e86]:
        - text: Top floor of the
        - emphasis [ref=e87]: Dana Warp Mill.
      - paragraph [ref=e88]: The mill is a 19th-century brick building on the Presumpscot River in Westbrook. We’re on the fourth floor, in a corner suite with tin ceilings, exposed beams, pine floors, and a wall of tall windows that does most of the lighting for us until late afternoon.
      - paragraph [ref=e89]: The main room fits about fifteen mats, with wall mirrors on two sides, hanging fabric overhead, and enough props to run barre, pilates, or mobility without anyone sharing gear.
      - list [ref=e90]:
        - listitem [ref=e91]: ◌ Wood floor, wall mirrors, tall east-facing windows
        - listitem [ref=e92]: ◌ Mats, blocks, balls, bands, and light weights provided
        - listitem [ref=e93]: ◌ Elevator access · step-free from the Bridge Street entrance
        - listitem [ref=e94]: ◌ Quiet neighbors, so voice and music are fine but heavy bass isn’t
