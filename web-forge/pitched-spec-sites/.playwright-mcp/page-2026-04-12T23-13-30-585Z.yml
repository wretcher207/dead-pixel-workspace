        - heading "Weekly classes" [level=3] [ref=e62]
        - paragraph [ref=e63]: Barre, pilates sculpt, myofascial rolling, and midday mindfulness. Most sessions run 45 minutes. Donation-based this season while we build out the schedule.
      - listitem [ref=e64]:
        - img [ref=e66]
        - heading "Workshops" [level=3] [ref=e70]
        - paragraph [ref=e71]: Guest-led sessions in breath, sound, dance, and longer-form mobility. New workshops get added to the calendar every month.
      - listitem [ref=e72]:
        - img [ref=e74]
        - heading "Book the studio" [level=3] [ref=e77]
        - paragraph [ref=e78]: Private classes, photo and video shoots, small pop-ups, and birthday movement parties. Rent the room by the hour. Email us what you’re planning.
