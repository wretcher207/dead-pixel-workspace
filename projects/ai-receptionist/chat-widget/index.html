<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Receptionist Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #141414;
      --bg-tertiary: #1e1e1e;
      --bg-input: #1a1a1a;
      --text-primary: #e8e8e8;
      --text-secondary: #999;
      --text-muted: #666;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --border: #2a2a2a;
      --user-bubble: #1d4ed8;
      --bot-bubble: #1e1e1e;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .chat-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .chat-header .avatar {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .chat-header .info h1 {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
    }

    .chat-header .info p {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }

    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.bot {
      align-self: flex-start;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.5;
      font-size: 14px;
      word-wrap: break-word;
    }

    .message.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
    }

    .message .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.bot .msg-avatar {
      background: var(--accent);
    }

    .message.user .msg-avatar {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 10px 14px;
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      margin-left: 38px;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    /* Input */
    .chat-input {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .chat-input textarea {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    .chat-input textarea:focus {
      border-color: var(--accent);
    }

    .chat-input textarea::placeholder {
      color: var(--text-muted);
    }

    .chat-input button {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: white;
      width: 42px;
      height: 42px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .chat-input button:hover {
      background: var(--accent-hover);
    }

    .chat-input button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .chat-input button svg {
      width: 18px;
      height: 18px;
    }

    /* Scrollbar */
    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* Powered by */
    .powered-by {
      text-align: center;
      padding: 8px;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
    }

    .powered-by a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .chat-header { padding: 12px 16px; }
      .chat-messages { padding: 16px; }
      .chat-input { padding: 12px 16px; }
      .message { max-width: 90%; }
    }
  </style>
</head>
<body>
  <div class="chat-header">
    <div class="avatar">A</div>
    <div class="info">
      <h1 id="agent-name">Amy</h1>
      <p><span class="status-dot"></span><span id="business-name">Aroostook Family Dental</span></p>
    </div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chat-input">
    <textarea
      id="user-input"
      placeholder="Type a message..."
      rows="1"
      autofocus
    ></textarea>
    <button id="send-btn" aria-label="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <div class="powered-by">
    Powered by <a href="#">Dead Pixel Design</a>
  </div>

  <script src="widget.js"></script>
</body>
</html>
